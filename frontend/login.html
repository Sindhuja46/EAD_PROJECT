<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin Login – Event Tracker</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-container">
    <button class="back-btn" onclick="window.location.href='home.html'">← Back to Home</button>
    
    <h2>Admin Login</h2>
    <form id="loginForm">
      <input type="text" name="username" placeholder="Username" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p id="errorMsg" style="color:red;"></p>
  </div>

  <script>
  const API = "http://localhost:5000/api/admin";

  document.getElementById("loginForm").addEventListener("submit", async e => {
    e.preventDefault();
    const creds = Object.fromEntries(new FormData(e.target).entries());
    try {
      const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(creds)
      });
      if (res.ok) {
        alert("Login successful!");
        window.location.href = "index.html";
      } else {
        const errorData = await res.json();
        document.getElementById("errorMsg").innerText = errorData.message || "Invalid username or password";
      }
    } catch (error) {
      console.error("Login error:", error);
      document.getElementById("errorMsg").innerText = "Failed to connect to server";
    }
  });
  </script>
</body>
</html>
