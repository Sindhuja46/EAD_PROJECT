<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Welcome – Event Registration Tracker</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="home-container">
    <h1>Welcome to the College Event Registration Portal</h1>
    <p>Please choose your role:</p>
    <div class="role-buttons">
      <button onclick="window.location.href='register.html'">
        <span class="icon">🧍‍♀</span>
        <span class="role-title">Participant</span>
        <span class="role-desc">Register for events</span>
      </button>
      <button onclick="window.location.href='login.html'">
        <span class="icon">👨‍💼</span>
        <span class="role-title">Admin</span>
        <span class="role-desc">Manage registrations</span>
      </button>
    </div>
  </div>
</body>
</html>
